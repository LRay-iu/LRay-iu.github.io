  <script>
    // 检查屏幕宽度
    function checkScreenWidth() {
      var screenWidth = window.innerWidth || document.documentElement.clientWidth || document.body.clientWidth;
  
      // 如果屏幕宽度大于等于 500px，则启用这段代码
      if (screenWidth >= 520) {
        var elements = document.querySelectorAll('.article-albums-caption');
        elements.forEach(function(element) {
          element.style.display = 'inline'; // 或者 'block', 'flex'，具体取决于你的布局需求
        });
      }
      if (screenWidth < 520) {
        var elements = document.querySelectorAll('.article-albums-caption');
        elements.forEach(function(element) {
          element.style.display = 'none'; // 或者 'block', 'flex'，具体取决于你的布局需求
        });
      }
    }
  
    // 页面加载完毕时执行一次检查
    window.onload = function() {
      checkScreenWidth();
    };
  
    // 当窗口大小改变时再次执行检查
    window.onresize = function() {
      checkScreenWidth();
    };
  </script>

<script>
  // 更新并实时显示站点运行时长
  function updateUptime() {
    // 获取网站创建时间，这里假设你有一个变量或者常量存储了网站创建时间
    var startDate = new Date('2024-04-28');
    
    // 计算运行时长
    var now = new Date();
    var uptime = now.getTime() - startDate.getTime();
    var seconds = Math.floor(uptime / 1000);
    var minutes = Math.floor(seconds / 60);
    var hours = Math.floor(minutes / 60);
    var days = Math.floor(hours / 24);
    
    // 计算剩余的小时、分钟和秒数
    hours %= 24;
    minutes %= 60;
    seconds %= 60;
    
    // 更新页面中的元素内容
    var uptimeString = days + ' 天, ' + hours + ' 小时, ' + minutes + ' 分钟, ' + seconds + ' 秒';
    document.getElementById('uptime').textContent = '本站已安全运行：' + uptimeString;
  }
  
  // 每秒更新一次运行时长
  setInterval(updateUptime, 1000);
  
  // 页面加载完成后立即更新一次
  updateUptime();
</script>
